<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <title>WBS Construction Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f1f5f9;
        color: #0f172a;
      }

      .navbar {
        height: 72px;
        background: #0f172a;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .navbar h1 {
        font-size: 22px;
      }

      .container {
        padding: 40px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .title {
        margin-bottom: 30px;
      }

      .title h2 {
        margin-bottom: 8px;
        font-size: 28px;
      }

      .title p {
        color: #64748b;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      label {
        margin-bottom: 10px;
        font-weight: 600;
      }

      select {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        outline: none;
        transition: 0.3s;
        font-size: 14px;
        max-height: 300px;
      }

      select:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      }

      .result {
        margin-top: 30px;
        background: #eff6ff;
        padding: 25px;
        border-radius: 16px;
        border-left: 5px solid #2563eb;
      }

      .result h3 {
        margin-bottom: 15px;
        color: #1d4ed8;
      }

      .badge {
        display: inline-block;
        margin-top: 18px;
        background: #dbeafe;
        color: #1d4ed8;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }

      @media (max-width: 768px) {
        .container {
          padding: 20px;
        }

        .navbar {
          padding: 0 20px;
        }
      }
    </style>
  </head>

    </div>

          <div class="form-group">

            </select>
          </div>

      const level4 = document.getElementById("level4");
      const level5 = document.getElementById("level5");
      const level6 = document.getElementById("level6");
      const detailResult = document.getElementById("detailResult");

      Object.keys(wbsData).forEach((item) => {
        level4.innerHTML += `
                                              <option value="${item}">
                                                ${item}
                                              </option>
                                            `;
      });

      level4.addEventListener("change", function () {
        level5.innerHTML = '<option value="">Pilih Aktivitas</option>';
        level6.innerHTML = '<option value="">Pilih Sumber Daya</option>';

        const selected = this.value;

        if (selected) {
          Object.keys(wbsData[selected]).forEach((item) => {
            level5.innerHTML += `
                                                  <option value="${item}">
                                                    ${item}
                                                  </option>
                                                `;
          });
        }
      });

      level5.addEventListener("change", function () {
        level6.innerHTML = '<option value="">Pilih Sumber Daya</option>';

        const selectedL4 = level4.value;
        const selectedL5 = this.value;

        if (selectedL5) {
          wbsData[selectedL4][selectedL5].forEach((item) => {
            level6.innerHTML += `
                                                  <option value="${item}">
                                                    ${item}
                                                  </option>
                                                `;
          });
        }
      });

      level6.addEventListener("change", function () {
        detailResult.innerHTML = `

                                              <strong>Level 4:</strong><br>
                                              ${level4.value}

                                              <br><br>

                                              <strong>Level 5:</strong><br>
                                              ${level5.value}

                                              <br><br>

                                              <strong>Level 6:</strong><br>
                                              ${this.value}

                                            `;
      });
