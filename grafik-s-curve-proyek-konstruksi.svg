  <text class="label-strong" x="190" y="190">Sumber Data</text>
  <text class="code" x="190" y="220">backend/api_get_scurve.php</text>
  <text class="small" x="190" y="248">project_scurve + approved change_requests.timeImpact</text>

  <rect class="panel-soft" x="790" y="150" width="430" height="120"/>
  <text class="label-strong" x="820" y="190">Total Delay Approved CR</text>
  <text class="title" x="820" y="242">3 hari</text>

  <rect class="panel-soft" x="1290" y="150" width="430" height="120"/>
