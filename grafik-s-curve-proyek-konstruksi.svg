  <text class="note-text" x="1770" y="1335">S-Curve menunjukkan deviasi progres kumulatif proyek terhadap baseline rencana.</text>
  <text class="note-text" x="1770" y="1365">Delay CR approved menjadi indikator dampak perubahan terhadap waktu.</text>
  <text class="note-text" x="1770" y="1395">Nilai delay bersifat pendukung dan tidak menggantikan analisis CPM detail.</text>
