<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1600" viewBox="0 0 2600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Grafik S-Curve Proyek Konstruksi WYLCORE</title>
  <desc id="desc">Grafik S-Curve proyek konstruksi dengan garis rencana kumulatif dan realisasi kumulatif serta anotasi total delay approved Change Request.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#111111"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #111111; stroke-width: 2.2; rx: 14; }
      .panel-soft { fill: #f4f5f7; stroke: #111111; stroke-width: 1.8; rx: 10; }
      .axis { stroke: #111111; stroke-width: 2.5; }
      .grid { stroke: #d5d8df; stroke-width: 1.5; }
      .plan { fill: none; stroke: #111111; stroke-width: 5; }
      .actual { fill: none; stroke: #6b7280; stroke-width: 5; stroke-dasharray: 14 10; }
      .marker-plan { fill: #111111; stroke: #ffffff; stroke-width: 2; }
      .marker-actual { fill: #ffffff; stroke: #6b7280; stroke-width: 4; }
      .label { font: 400 16px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
      .label-strong { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .small { font: 400 13.5px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .tiny { font: 400 12.5px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 0; }
      .code { font: 400 14px Consolas, 'Courier New', monospace; fill: #111111; letter-spacing: 0; }
      .callout { fill: #ffffff; stroke: #111111; stroke-width: 2; rx: 12; }
      .line { fill: none; stroke: #111111; stroke-width: 2.2; marker-end: url(#arrow); }
      .legend-line-plan { stroke: #111111; stroke-width: 5; }
      .legend-line-actual { stroke: #6b7280; stroke-width: 5; stroke-dasharray: 14 10; }
      .note { fill: #ffffff; stroke: #111111; stroke-width: 1.8; rx: 10; }
      .note-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .note-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
    </style>
