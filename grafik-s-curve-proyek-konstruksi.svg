  <polyline class="plan" points="340,1028 500,992 660,942 820,870 980,776 1140,676 1300,560 1460,474 1620,402 1780,359 1940,337 2100,330"/>
  <polyline class="actual" points="340,1032 500,1007 660,964 820,906 980,820 1140,726 1300,632 1460,546"/>

