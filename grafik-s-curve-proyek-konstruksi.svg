  <text class="note-title" x="190" y="1305">Data Store</text>
  <text class="note-text" x="190" y="1335">project_scurve: periode_ke, tanggal_target, rencana_kumulatif, realisasi_kumulatif.</text>
  <text class="note-text" x="190" y="1365">change_requests: status, projectArea, timeImpact.</text>
  <text class="note-text" x="190" y="1395">projects: project_id, project_name, status, progress.</text>

