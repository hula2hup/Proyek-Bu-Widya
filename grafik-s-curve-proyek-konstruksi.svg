  <rect class="bg" width="2600" height="1600"/>
  <text class="title" x="1300" y="72" text-anchor="middle">Grafik S-Curve Proyek Konstruksi</text>
  <text class="subtitle" x="1300" y="110" text-anchor="middle">PRJ-001 - Proyek Konstruksi Jembatan Beton Precast | Rencana vs Realisasi Kumulatif</text>

  <!-- Header cards -->
