<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1500" viewBox="0 0 2600 1500" role="img" aria-labelledby="title desc">
  <title id="title">Diagram Proses AI Recommendation Engine Berbasis Aturan</title>
  <desc id="desc">Diagram proses rekomendasi AI berbasis rule-based expert system pada sistem Change Request konstruksi WYLCORE.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#111111"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.3; rx: 14; }
      .box-soft { fill: #f6f7f9; stroke: #111111; stroke-width: 2.2; rx: 14; }
      .box-dark { fill: #111827; stroke: #111827; stroke-width: 2.2; rx: 14; }
      .store { fill: #ffffff; stroke: #111111; stroke-width: 2.4; }
      .store-side { stroke: #111111; stroke-width: 2.4; }
      .step { font: 700 21px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .step-light { font: 700 21px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .text { font: 400 16px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
      .text-light { font: 400 16px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .small { font: 400 13.5px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .small-light { font: 400 13.5px Arial, Helvetica, sans-serif; fill: #e5e7eb; letter-spacing: 0; }
      .code { font: 400 14px Consolas, 'Courier New', monospace; fill: #111111; letter-spacing: 0; }
      .code-light { font: 400 14px Consolas, 'Courier New', monospace; fill: #ffffff; letter-spacing: 0; }
      .line { fill: none; stroke: #111111; stroke-width: 2.5; marker-end: url(#arrow); }
      .line-dash { fill: none; stroke: #111111; stroke-width: 2.2; stroke-dasharray: 9 7; marker-end: url(#arrow); }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .note { fill: #ffffff; stroke: #111111; stroke-width: 1.8; rx: 10; }
      .note-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .note-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
      .badge { fill: #ffffff; stroke: #111111; stroke-width: 1.6; rx: 15; }
    </style>
  </defs>

  <rect class="bg" width="2600" height="1500"/>
  <text class="title" x="1300" y="72" text-anchor="middle">Diagram Proses AI Recommendation Engine Berbasis Aturan</text>
  <text class="subtitle" x="1300" y="110" text-anchor="middle">Input Change Request -> Normalisasi Kode -> LEFT JOIN -> Matching WBS/Risk -> Insight, Saran, Badge Risiko</text>

  <!-- Rule-based note -->
  <rect class="box-dark" x="120" y="145" width="2360" height="76"/>
  <text class="step-light" x="150" y="178">Catatan Penting</text>
  <text class="text-light" x="150" y="206">AI Recommendation Engine pada project ini adalah rule-based expert system berbasis knowledge_repository, bukan machine learning dan bukan generative AI.</text>

  <!-- Input area -->
  <rect class="box" x="120" y="300" width="430" height="270"/>
  <text class="step" x="335" y="342" text-anchor="middle">1. Input Change Request</text>
  <text class="small" x="335" y="370" text-anchor="middle">Sumber: site-engineer.html -> backend/save_data.php</text>
  <line x1="150" y1="392" x2="520" y2="392" stroke="#d0d5dd" stroke-width="2"/>
  <text class="text" x="155" y="425">Data utama:</text>
  <text class="code" x="175" y="456">changeId</text>
  <text class="code" x="175" y="486">wbsLevel5</text>
  <text class="code" x="175" y="516">riskVariable</text>
  <text class="code" x="330" y="456">risk</text>
  <text class="code" x="330" y="486">riskCategory</text>
  <text class="code" x="330" y="516">status = PENDING</text>

  <rect class="store" x="120" y="650" width="430" height="130"/>
  <line class="store-side" x1="150" y1="650" x2="150" y2="780"/>
  <line class="store-side" x1="520" y1="650" x2="520" y2="780"/>
  <text class="step" x="335" y="696" text-anchor="middle">D1 change_requests</text>
  <text class="small" x="335" y="725" text-anchor="middle">Transaksi CR lapangan</text>
  <text class="small" x="335" y="752" text-anchor="middle">WBS, risiko, dampak, evidence, status</text>

  <!-- Normalization -->
  <rect class="box-soft" x="705" y="390" width="450" height="250"/>
  <text class="step" x="930" y="432" text-anchor="middle">2. Normalisasi Kode</text>
  <text class="small" x="930" y="460" text-anchor="middle">Sumber query: backend/api_get_change_requests.php</text>
  <line x1="735" y1="482" x2="1125" y2="482" stroke="#d0d5dd" stroke-width="2"/>
  <text class="code" x="735" y="515">TRIM(cr.riskVariable)</text>
  <text class="code" x="735" y="545">SUBSTRING(TRIM(cr.wbsLevel5), 1, 7)</text>
  <text class="code" x="735" y="575">COLLATE utf8mb4_unicode_ci</text>
  <text class="text" x="735" y="610">Tujuan: mengurangi mismatch format kode.</text>

  <!-- Repository store -->
  <rect class="store" x="705" y="735" width="450" height="155"/>
  <line class="store-side" x1="735" y1="735" x2="735" y2="890"/>
  <line class="store-side" x1="1125" y1="735" x2="1125" y2="890"/>
  <text class="step" x="930" y="780" text-anchor="middle">D2 knowledge_repository</text>
  <text class="code" x="780" y="812">wbs_kode, wbs_nama</text>
  <text class="code" x="780" y="842">risk_kode, risk_nama</text>
  <text class="code" x="780" y="872">insight, saran</text>

  <!-- Join/matching -->
  <rect class="box" x="1300" y="350" width="580" height="350"/>
  <text class="step" x="1590" y="392" text-anchor="middle">3. LEFT JOIN dan Matching</text>
  <text class="small" x="1590" y="420" text-anchor="middle">CR tetap tampil walau repository belum cocok</text>
  <line x1="1330" y1="442" x2="1850" y2="442" stroke="#d0d5dd" stroke-width="2"/>
  <text class="code" x="1335" y="475">FROM change_requests cr</text>
  <text class="code" x="1335" y="505">LEFT JOIN knowledge_repository kr</text>
  <text class="code" x="1335" y="535">ON TRIM(cr.riskVariable) = TRIM(kr.risk_kode)</text>
  <text class="code" x="1335" y="565">AND SUBSTRING(TRIM(cr.wbsLevel5),1,7)</text>
  <text class="code" x="1370" y="595">= TRIM(kr.wbs_kode)</text>
  <text class="code" x="1335" y="625">WHERE UPPER(cr.status) = 'PENDING'</text>
  <text class="small" x="1335" y="665">File: backend/api_get_change_requests.php dan api_get_dashboard_stats.php</text>

  <polygon points="1590,790 1720,885 1590,980 1460,885" fill="#ffffff" stroke="#111111" stroke-width="2.3"/>
  <text class="step" x="1590" y="875" text-anchor="middle">Match</text>
  <text class="step" x="1590" y="902" text-anchor="middle">ditemukan?</text>

  <!-- Default recommendation -->
  <rect class="box-soft" x="1300" y="1060" width="580" height="155"/>
  <text class="step" x="1590" y="1102" text-anchor="middle">4b. Fallback Jika Tidak Ada Match</text>
  <text class="text" x="1335" y="1137">CR tetap masuk antrean review.</text>
  <text class="text" x="1335" y="1167">Sistem menampilkan pesan default agar PM</text>
  <text class="text" x="1335" y="1197">melakukan penilaian profesional/manual.</text>

  <!-- Output -->
  <rect class="box" x="2050" y="325" width="430" height="330"/>
  <text class="step" x="2265" y="367" text-anchor="middle">4a. Output Rekomendasi</text>
  <text class="small" x="2265" y="395" text-anchor="middle">Dikirim sebagai JSON ke frontend</text>
  <line x1="2080" y1="417" x2="2450" y2="417" stroke="#d0d5dd" stroke-width="2"/>
  <text class="text" x="2085" y="452">Output utama:</text>
  <rect class="badge" x="2085" y="472" width="320" height="36"/>
  <text class="code" x="2105" y="496">kr.insight</text>
  <rect class="badge" x="2085" y="522" width="320" height="36"/>
  <text class="code" x="2105" y="546">kr.saran</text>
  <rect class="badge" x="2085" y="572" width="320" height="36"/>
  <text class="code" x="2105" y="596">risk badge: Aman - Kritis</text>
  <text class="small" x="2085" y="632">Frontend: project-manager.html dan admin.html</text>

  <rect class="box-soft" x="2050" y="790" width="430" height="250"/>
  <text class="step" x="2265" y="832" text-anchor="middle">5. Rendering UI</text>
  <text class="small" x="2265" y="860" text-anchor="middle">Dashboard Project Manager</text>
  <line x1="2080" y1="882" x2="2450" y2="882" stroke="#d0d5dd" stroke-width="2"/>
  <text class="text" x="2085" y="917">- Tabel pending CR</text>
  <text class="text" x="2085" y="947">- Panel rekomendasi AI</text>
  <text class="text" x="2085" y="977">- Badge risiko 1-10</text>
  <text class="text" x="2085" y="1007">- Tombol approve/reject/pending</text>

  <rect class="box-soft" x="2050" y="1110" width="430" height="145"/>
  <text class="step" x="2265" y="1152" text-anchor="middle">6. Keputusan PM</text>
  <text class="small" x="2265" y="1180" text-anchor="middle">backend/save_approval.php</text>
  <text class="text" x="2085" y="1215">Status: APPROVED / REJECTED / PENDING</text>

  <!-- Flow arrows -->
  <path class="line" d="M 550 435 H 695"/>
  <text class="label" x="620" y="415" text-anchor="middle">ambil WBS + risk</text>
  <path class="line" d="M 335 570 V 640"/>
  <path class="line" d="M 550 715 C 640 715, 650 540, 695 525"/>
  <text class="label" x="605" y="700">data CR</text>
  <path class="line" d="M 1155 515 H 1290"/>
  <text class="label" x="1220" y="495" text-anchor="middle">kode ternormalisasi</text>
  <path class="line-dash" d="M 1155 812 C 1240 780, 1270 620, 1300 570"/>
  <text class="label" x="1240" y="760">basis aturan</text>
  <path class="line" d="M 1590 700 V 780"/>
  <path class="line" d="M 1720 885 C 1855 850, 1960 520, 2040 490"/>
  <text class="label" x="1875" y="690">Ya: insight + saran</text>
  <path class="line" d="M 1590 980 V 1050"/>
  <text class="label" x="1618" y="1020">Tidak</text>
  <path class="line" d="M 1880 1140 C 1970 1125, 2025 1005, 2040 930"/>
  <text class="label" x="1985" y="1090">pesan default</text>
  <path class="line" d="M 2265 655 V 780"/>
  <path class="line" d="M 2265 1040 V 1100"/>
  <path class="line-dash" d="M 2050 1195 C 1720 1300, 940 1210, 555 760"/>
  <text class="label" x="1380" y="1302" text-anchor="middle">feedback status approval ke change_requests dan dashboard</text>

  <!-- Bottom notes -->
  <rect class="note" x="120" y="1315" width="720" height="130"/>
  <text class="note-title" x="150" y="1350">File Project yang Terlibat</text>
  <text class="note-text" x="150" y="1380">Input CR: site-engineer.html, backend/save_data.php, backend/update_data.php</text>
  <text class="note-text" x="150" y="1410">Review rekomendasi: project-manager.html, admin.html, backend/api_get_change_requests.php</text>

  <rect class="note" x="940" y="1315" width="720" height="130"/>
  <text class="note-title" x="970" y="1350">Informasi yang Diolah</text>
  <text class="note-text" x="970" y="1380">change_requests: changeId, wbsLevel5, riskVariable, risk, status, description.</text>
  <text class="note-text" x="970" y="1410">knowledge_repository: wbs_kode, risk_kode, insight, saran, risk_kategori.</text>

  <rect class="note" x="1760" y="1315" width="720" height="130"/>
  <text class="note-title" x="1790" y="1350">Batasan Akademis</text>
  <text class="note-text" x="1790" y="1380">Rekomendasi bersifat decision support, bukan keputusan otomatis.</text>
  <text class="note-text" x="1790" y="1410">Kualitas hasil bergantung pada konsistensi WBS, riskVariable, dan kurasi repository.</text>
</svg>
