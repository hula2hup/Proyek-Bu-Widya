<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700" role="img" aria-labelledby="title desc">
  <title id="title">Activity Diagram Proses Change Request WYLCORE</title>
  <desc id="desc">Activity diagram dengan swimlane Site Engineer, Sistem, dan Project Manager untuk proses Change Request konstruksi.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#111111"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .lane { fill: #ffffff; stroke: #111111; stroke-width: 2.5; }
      .lane-head { fill: #f5f5f5; stroke: #111111; stroke-width: 2.5; }
      .lane-title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .node { fill: #ffffff; stroke: #111111; stroke-width: 2.2; rx: 18; }
      .node-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .node-file { font: 400 13.5px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .decision { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .decision-text { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
      .tiny { font: 400 12.5px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .note { fill: #ffffff; stroke: #111111; stroke-width: 1.7; rx: 10; }
      .note-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .note-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
      .line { fill: none; stroke: #111111; stroke-width: 2.4; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #111111; stroke-width: 1.8; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .bar { fill: #111111; stroke: #111111; stroke-width: 1; rx: 4; }
      .start { fill: #111111; stroke: #111111; stroke-width: 2; }
      .endOuter { fill: #ffffff; stroke: #111111; stroke-width: 3; }
      .endInner { fill: #111111; stroke: #111111; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="2400" height="1700"/>
  <text class="title" x="1200" y="70" text-anchor="middle">Activity Diagram Proses Change Request</text>
  <text class="subtitle" x="1200" y="105" text-anchor="middle">Swimlane: Site Engineer, Sistem, Project Manager | Terhubung dengan file dan data project WYLCORE</text>

  <!-- Swimlanes -->
  <rect class="lane" x="80" y="155" width="2240" height="1295"/>
  <rect class="lane-head" x="80" y="155" width="2240" height="62"/>
  <rect class="lane" x="80" y="155" width="660" height="1295"/>
  <rect class="lane" x="740" y="155" width="920" height="1295"/>
  <rect class="lane" x="1660" y="155" width="660" height="1295"/>
  <line x1="80" y1="217" x2="2320" y2="217" stroke="#111111" stroke-width="2.5"/>
  <text class="lane-title" x="410" y="195" text-anchor="middle">Site Engineer</text>
  <text class="lane-title" x="1200" y="195" text-anchor="middle">Sistem</text>
  <text class="lane-title" x="1990" y="195" text-anchor="middle">Project Manager</text>

  <!-- Start and SE activities -->
  <circle class="start" cx="410" cy="265" r="18"/>
  <rect class="node" x="205" y="315" width="410" height="86"/>
  <text class="node-title" x="410" y="347" text-anchor="middle">Mengisi Form Change Request</text>
  <text class="node-file" x="410" y="374" text-anchor="middle">site-engineer.html</text>

  <rect class="node" x="205" y="455" width="410" height="96"/>
  <text class="node-title" x="410" y="488" text-anchor="middle">Pilih WBS, Risiko, Dampak, Lokasi</text>
  <text class="node-file" x="410" y="515" text-anchor="middle">wbsLevel4-6, risk, riskCategory, riskVariable</text>

  <rect class="node" x="205" y="605" width="410" height="90"/>
  <text class="node-title" x="410" y="638" text-anchor="middle">Upload Evidence</text>
  <text class="node-file" x="410" y="665" text-anchor="middle">photoEvidence, uploads/</text>

  <rect class="node" x="205" y="750" width="410" height="88"/>
  <text class="node-title" x="410" y="782" text-anchor="middle">Submit CR</text>
  <text class="node-file" x="410" y="810" text-anchor="middle">fetch('backend/save_data.php')</text>

  <!-- System validation and save -->
  <rect class="node" x="890" y="315" width="520" height="92"/>
  <text class="node-title" x="1150" y="348" text-anchor="middle">Validasi Data Pengajuan</text>
  <text class="node-file" x="1150" y="376" text-anchor="middle">backend/save_data.php</text>

  <polygon class="decision" points="1150,455 1255,530 1150,605 1045,530"/>
  <text class="decision-text" x="1150" y="525" text-anchor="middle">Data</text>
  <text class="decision-text" x="1150" y="548" text-anchor="middle">valid?</text>

  <rect class="node" x="890" y="650" width="520" height="96"/>
  <text class="node-title" x="1150" y="683" text-anchor="middle">Simpan CR ke Database</text>
  <text class="node-file" x="1150" y="711" text-anchor="middle">change_requests: status awal PENDING</text>

  <rect class="node" x="890" y="800" width="520" height="104"/>
  <text class="node-title" x="1150" y="833" text-anchor="middle">Cocokkan WBS dan Risiko</text>
  <text class="node-file" x="1150" y="861" text-anchor="middle">LEFT JOIN change_requests + knowledge_repository</text>
  <text class="node-file" x="1150" y="884" text-anchor="middle">api_get_change_requests.php</text>

  <rect class="node" x="890" y="955" width="520" height="94"/>
  <text class="node-title" x="1150" y="988" text-anchor="middle">Tampilkan Antrean Review</text>
  <text class="node-file" x="1150" y="1016" text-anchor="middle">JSON -> dashboard PM, badge risiko, rekomendasi</text>

  <!-- PM review -->
  <rect class="node" x="1785" y="955" width="410" height="94"/>
  <text class="node-title" x="1990" y="988" text-anchor="middle">Review Detail CR</text>
  <text class="node-file" x="1990" y="1016" text-anchor="middle">project-manager.html, modal approval</text>

  <rect class="node" x="1785" y="1110" width="410" height="92"/>
  <text class="node-title" x="1990" y="1142" text-anchor="middle">Input Keputusan dan Catatan</text>
  <text class="node-file" x="1990" y="1170" text-anchor="middle">costImpact, timeImpact, approvalNotes</text>

  <polygon class="decision" points="1990,1260 2095,1335 1990,1410 1885,1335"/>
  <text class="decision-text" x="1990" y="1318" text-anchor="middle">Keputusan</text>
  <text class="decision-text" x="1990" y="1341" text-anchor="middle">PM?</text>

  <!-- System decision handling -->
  <rect class="node" x="890" y="1110" width="520" height="94"/>
  <text class="node-title" x="1150" y="1143" text-anchor="middle">Simpan Approval</text>
  <text class="node-file" x="1150" y="1171" text-anchor="middle">backend/save_approval.php, change_requests.status</text>

  <rect class="node" x="890" y="1255" width="520" height="96"/>
  <text class="node-title" x="1150" y="1288" text-anchor="middle">Buat Lesson Learned</text>
  <text class="node-file" x="1150" y="1316" text-anchor="middle">knowledge_base_auto.php -> knowledge_base</text>

  <rect class="node" x="890" y="1390" width="520" height="92"/>
  <text class="node-title" x="1150" y="1422" text-anchor="middle">Update Dashboard dan Status</text>
  <text class="node-file" x="1150" y="1450" text-anchor="middle">api_get_dashboard_stats.php, get_data.php</text>

  <rect class="node" x="205" y="1390" width="410" height="92"/>
  <text class="node-title" x="410" y="1422" text-anchor="middle">Lihat Status CR</text>
  <text class="node-file" x="410" y="1450" text-anchor="middle">PENDING / APPROVED / REJECTED</text>

  <circle class="endOuter" cx="1990" cy="1485" r="23"/>
  <circle class="endInner" cx="1990" cy="1485" r="13"/>

  <!-- Error / pending states -->
  <rect class="node" x="890" y="485" width="360" height="74"/>
  <text class="node-title" x="1070" y="515" text-anchor="middle">Kembalikan Pesan Error</text>
  <text class="node-file" x="1070" y="540" text-anchor="middle">status = error, message</text>

  <rect class="node" x="1525" y="1260" width="300" height="78"/>
  <text class="node-title" x="1675" y="1291" text-anchor="middle">Tetap Pending</text>
  <text class="node-file" x="1675" y="1318" text-anchor="middle">status PENDING</text>

  <rect class="node" x="1525" y="1368" width="300" height="78"/>
  <text class="node-title" x="1675" y="1399" text-anchor="middle">Tolak CR</text>
  <text class="node-file" x="1675" y="1426" text-anchor="middle">status REJECTED</text>

  <!-- Flow arrows -->
  <path class="line" d="M 410 283 V 305"/>
  <path class="line" d="M 410 401 V 445"/>
  <path class="line" d="M 410 551 V 595"/>
  <path class="line" d="M 410 695 V 740"/>
  <path class="line" d="M 615 794 C 730 794, 770 360, 880 360"/>

  <path class="line" d="M 1150 407 V 445"/>
  <path class="line" d="M 1150 605 V 640"/>
  <text class="small" x="1182" y="625">Ya</text>
  <path class="line" d="M 1045 530 H 1010"/>
  <text class="small" x="1012" y="508">Tidak</text>
  <path class="line" d="M 1070 559 C 900 610, 700 520, 615 505"/>

  <path class="line" d="M 1150 746 V 790"/>
  <path class="line" d="M 1150 904 V 945"/>
  <path class="line" d="M 1410 1002 H 1775"/>
  <path class="line" d="M 1990 1049 V 1100"/>
  <path class="line" d="M 1785 1156 H 1420"/>
  <path class="line" d="M 1410 1157 H 1775"/>
  <path class="line" d="M 1990 1202 V 1250"/>

  <path class="line" d="M 1885 1335 H 1835"/>
  <text class="small" x="1840" y="1314">Pending</text>
  <path class="line" d="M 1675 1260 C 1590 1220, 1510 1185, 1410 1160"/>
  <path class="line" d="M 1885 1360 H 1835 C 1810 1360, 1810 1407, 1835 1407 H 1825"/>
  <text class="small" x="1845" y="1388">Rejected</text>
  <path class="line" d="M 1675 1446 C 1600 1470, 1490 1465, 1410 1440"/>
  <path class="line" d="M 1990 1410 C 1870 1505, 1530 1330, 1420 1303"/>
  <text class="small" x="1928" y="1445">Approved</text>

  <path class="line" d="M 1150 1204 V 1245"/>
  <path class="line" d="M 1150 1351 V 1380"/>
  <path class="line" d="M 890 1436 H 625"/>
  <path class="line" d="M 1410 1436 C 1600 1505, 1810 1500, 1960 1485"/>

  <!-- Data object notes -->
  <rect class="note" x="80" y="1515" width="690" height="125"/>
  <text class="note-title" x="110" y="1548">Data Input Utama</text>
  <text class="note-text" x="110" y="1578">changeId, changeDate, submittedBy, projectArea, location, bimObjectId.</text>
  <text class="note-text" x="110" y="1608">wbsLevel4-6, risk, riskCategory, riskVariable, impactCost/Time/Scope/Quality/Safety.</text>

  <rect class="note" x="855" y="1515" width="690" height="125"/>
  <text class="note-title" x="885" y="1548">File dan Tabel yang Terlibat</text>
  <text class="note-text" x="885" y="1578">site-engineer.html, project-manager.html, backend/save_data.php, save_approval.php.</text>
  <text class="note-text" x="885" y="1608">change_requests, knowledge_repository, knowledge_base, uploads/.</text>

  <rect class="note" x="1630" y="1515" width="690" height="125"/>
  <text class="note-title" x="1660" y="1548">Keluaran Proses</text>
  <text class="note-text" x="1660" y="1578">Status CR: PENDING, APPROVED, REJECTED.</text>
  <text class="note-text" x="1660" y="1608">Jika approved: lesson learned KM-xxx tersimpan pada knowledge_base.</text>

  <!-- Legend -->
  <text class="tiny" x="1200" y="1670" text-anchor="middle">Diagram ini memodelkan aktivitas utama proses Change Request; detail query, session, dan validasi teknis dijelaskan pada backend PHP serta BAB_Sistem_Informasi.md.</text>
