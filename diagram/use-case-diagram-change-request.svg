<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500" role="img" aria-labelledby="title desc">
  <title id="title">Use Case Diagram UML Sistem Informasi Change Request Konstruksi</title>
  <desc id="desc">Diagram use case UML hitam putih untuk aktor Admin, Project Manager, dan Site Engineer pada sistem informasi Change Request konstruksi WYLCORE.</desc>
  <defs>
    <marker id="arrow-open" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#111111" stroke-width="1.8"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .boundary { fill: #ffffff; stroke: #111111; stroke-width: 3; rx: 18; }
      .boundary-title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .actor-label { font: 700 22px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .uc { fill: #ffffff; stroke: #111111; stroke-width: 2.4; }
      .uc-title { font: 700 19px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .uc-file { font: 400 14px Arial, Helvetica, sans-serif; fill: #333333; letter-spacing: 0; }
      .note-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111111; letter-spacing: 0; }
      .note-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
      .line { fill: none; stroke: #111111; stroke-width: 2.2; }
      .dash { fill: none; stroke: #111111; stroke-width: 1.8; stroke-dasharray: 8 6; marker-end: url(#arrow-open); }
      .note { fill: #ffffff; stroke: #111111; stroke-width: 1.8; rx: 10; }
      .legend { font: 400 14px Arial, Helvetica, sans-serif; fill: #222222; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="2400" height="1500"/>

  <text class="title" x="1200" y="70" text-anchor="middle">Use Case Diagram UML Sistem Informasi Change Request Konstruksi</text>
  <text class="subtitle" x="1200" y="105" text-anchor="middle">Aktor, kebutuhan fungsional, dan keterkaitan dengan file implementasi project WYLCORE</text>

  <!-- System boundary -->
  <rect class="boundary" x="455" y="160" width="1490" height="1110"/>
  <text class="boundary-title" x="1200" y="200" text-anchor="middle">WYLCORE Web App - Sistem Informasi Change Request</text>

  <!-- Actors -->
  <g id="actor-admin" transform="translate(175 265)">
    <circle cx="0" cy="0" r="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="34" x2="0" y2="128" class="line"/>
    <line x1="-62" y1="70" x2="62" y2="70" class="line"/>
    <line x1="0" y1="128" x2="-52" y2="205" class="line"/>
    <line x1="0" y1="128" x2="52" y2="205" class="line"/>
    <text class="actor-label" x="0" y="250" text-anchor="middle">Admin</text>
  </g>

  <g id="actor-se" transform="translate(175 920)">
    <circle cx="0" cy="0" r="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="34" x2="0" y2="128" class="line"/>
    <line x1="-62" y1="70" x2="62" y2="70" class="line"/>
    <line x1="0" y1="128" x2="-52" y2="205" class="line"/>
    <line x1="0" y1="128" x2="52" y2="205" class="line"/>
    <text class="actor-label" x="0" y="250" text-anchor="middle">Site Engineer</text>
  </g>

  <g id="actor-pm" transform="translate(2190 595)">
    <circle cx="0" cy="0" r="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <line x1="0" y1="34" x2="0" y2="128" class="line"/>
    <line x1="-62" y1="70" x2="62" y2="70" class="line"/>
    <line x1="0" y1="128" x2="-52" y2="205" class="line"/>
    <line x1="0" y1="128" x2="52" y2="205" class="line"/>
    <text class="actor-label" x="0" y="250" text-anchor="middle">Project Manager</text>
  </g>

  <!-- Use cases: Admin -->
  <g id="uc-admin">
    <ellipse class="uc" cx="760" cy="290" rx="185" ry="58"/>
    <text class="uc-title" x="760" y="284" text-anchor="middle">Kelola Proyek</text>
    <text class="uc-file" x="760" y="310" text-anchor="middle">admin.html, api_add/update/save_project.php</text>

    <ellipse class="uc" cx="760" cy="430" rx="185" ry="58"/>
    <text class="uc-title" x="760" y="424" text-anchor="middle">Kelola User</text>
    <text class="uc-file" x="760" y="450" text-anchor="middle">admin.html, api_user_management.php</text>

    <ellipse class="uc" cx="760" cy="570" rx="190" ry="58"/>
    <text class="uc-title" x="760" y="564" text-anchor="middle">Assignment Proyek</text>
    <text class="uc-file" x="760" y="590" text-anchor="middle">project_assignments, api_user_management.php</text>

    <ellipse class="uc" cx="760" cy="710" rx="190" ry="58"/>
    <text class="uc-title" x="760" y="704" text-anchor="middle">Kelola Knowledge Base</text>
    <text class="uc-file" x="760" y="730" text-anchor="middle">api_knowledge_base.php, knowledge_base</text>

    <ellipse class="uc" cx="760" cy="850" rx="185" ry="58"/>
    <text class="uc-title" x="760" y="844" text-anchor="middle">Laporan</text>
    <text class="uc-file" x="760" y="870" text-anchor="middle">dashboard stats, S-Curve, print report</text>
  </g>

  <!-- Use cases: shared / PM -->
  <g id="uc-pm">
    <ellipse class="uc" cx="1300" cy="310" rx="185" ry="58"/>
    <text class="uc-title" x="1300" y="304" text-anchor="middle">Lihat Dashboard</text>
    <text class="uc-file" x="1300" y="330" text-anchor="middle">project-manager.html, api_get_dashboard_stats.php</text>

    <ellipse class="uc" cx="1300" cy="455" rx="185" ry="58"/>
    <text class="uc-title" x="1300" y="449" text-anchor="middle">Review CR</text>
    <text class="uc-file" x="1300" y="475" text-anchor="middle">api_get_change_requests.php</text>

    <ellipse class="uc" cx="1300" cy="600" rx="190" ry="58"/>
    <text class="uc-title" x="1300" y="594" text-anchor="middle">Approve / Reject</text>
    <text class="uc-file" x="1300" y="620" text-anchor="middle">save_approval.php, change_requests.status</text>

    <ellipse class="uc" cx="1300" cy="745" rx="205" ry="58"/>
    <text class="uc-title" x="1300" y="739" text-anchor="middle">Lihat Rekomendasi AI</text>
    <text class="uc-file" x="1300" y="765" text-anchor="middle">knowledge_repository, LEFT JOIN WBS-risiko</text>

    <ellipse class="uc" cx="1300" cy="890" rx="185" ry="58"/>
    <text class="uc-title" x="1300" y="884" text-anchor="middle">Lihat BIM</text>
    <text class="uc-file" x="1300" y="910" text-anchor="middle">api_aps_token/properties.php, bimObjectId</text>
  </g>

  <!-- Use cases: Site Engineer -->
  <g id="uc-se">
    <ellipse class="uc" cx="760" cy="1010" rx="185" ry="58"/>
    <text class="uc-title" x="760" y="1004" text-anchor="middle">Input CR</text>
    <text class="uc-file" x="760" y="1030" text-anchor="middle">site-engineer.html, save_data.php</text>

    <ellipse class="uc" cx="760" cy="1150" rx="185" ry="58"/>
    <text class="uc-title" x="760" y="1144" text-anchor="middle">Upload Evidence</text>
    <text class="uc-file" x="760" y="1170" text-anchor="middle">uploads/, photoEvidence</text>

    <ellipse class="uc" cx="1300" cy="1035" rx="185" ry="58"/>
    <text class="uc-title" x="1300" y="1029" text-anchor="middle">Pilih WBS</text>
    <text class="uc-file" x="1300" y="1055" text-anchor="middle">wbsLevel4, wbsLevel5, wbsLevel6</text>

    <ellipse class="uc" cx="1300" cy="1170" rx="185" ry="58"/>
    <text class="uc-title" x="1300" y="1164" text-anchor="middle">Pilih Risiko</text>
    <text class="uc-file" x="1300" y="1190" text-anchor="middle">risk, riskCategory, riskVariable</text>

    <ellipse class="uc" cx="1660" cy="1045" rx="185" ry="58"/>
    <text class="uc-title" x="1660" y="1039" text-anchor="middle">Lihat Status</text>
    <text class="uc-file" x="1660" y="1065" text-anchor="middle">get_data.php, status CR</text>
  </g>

  <!-- Associations: Admin -->
  <path class="line" d="M 238 340 L 575 290"/>
  <path class="line" d="M 238 360 L 575 430"/>
  <path class="line" d="M 238 382 L 570 570"/>
  <path class="line" d="M 238 405 L 570 710"/>
  <path class="line" d="M 238 430 L 575 850"/>

  <!-- Associations: PM -->
  <path class="line" d="M 2128 648 L 1485 310"/>
  <path class="line" d="M 2128 670 L 1485 455"/>
  <path class="line" d="M 2128 700 L 1490 600"/>
  <path class="line" d="M 2128 730 L 1505 745"/>
  <path class="line" d="M 2128 760 L 1485 890"/>

  <!-- Associations: Site Engineer -->
  <path class="line" d="M 238 990 L 575 1010"/>
  <path class="line" d="M 238 1016 L 575 1150"/>
  <path class="line" d="M 238 1042 L 1115 1035"/>
  <path class="line" d="M 238 1068 L 1115 1170"/>
  <path class="line" d="M 238 1094 L 1475 1045"/>

  <!-- Include/extend dependencies -->
  <path class="dash" d="M 895 1015 C 1030 1010, 1120 1030, 1120 1035"/>
  <text class="legend" x="1005" y="1000" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>
  <path class="dash" d="M 900 1028 C 1020 1100, 1120 1150, 1120 1170"/>
  <text class="legend" x="1018" y="1108" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>
  <path class="dash" d="M 900 1048 C 980 1085, 1020 1140, 940 1150"/>
  <text class="legend" x="970" y="1085" text-anchor="middle">&lt;&lt;extend&gt;&gt;</text>

  <path class="dash" d="M 1425 455 C 1535 500, 1540 570, 1450 600"/>
  <text class="legend" x="1552" y="536">&lt;&lt;include&gt;&gt;</text>
  <path class="dash" d="M 1420 455 C 1530 585, 1535 690, 1485 745"/>
  <text class="legend" x="1564" y="650">&lt;&lt;include&gt;&gt;</text>
  <path class="dash" d="M 1425 455 C 1575 645, 1565 820, 1485 890"/>
  <text class="legend" x="1605" y="780">&lt;&lt;extend&gt;&gt;</text>

  <path class="dash" d="M 875 850 C 1020 780, 1110 740, 1110 745"/>
  <text class="legend" x="1008" y="792" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>
  <path class="dash" d="M 875 710 C 1010 725, 1090 740, 1095 745"/>
  <text class="legend" x="985" y="715" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <!-- Notes -->
  <rect class="note" x="80" y="1300" width="700" height="125"/>
  <text class="note-title" x="110" y="1333">Catatan Implementasi</text>
  <text class="note-text" x="110" y="1362">Frontend utama: admin.html, project-manager.html, site-engineer.html, login.html.</text>
  <text class="note-text" x="110" y="1392">Backend: folder backend/ dengan endpoint PHP dan helper server-side.</text>

  <rect class="note" x="850" y="1300" width="700" height="125"/>
  <text class="note-title" x="880" y="1333">Informasi yang Dikelola</text>
  <text class="note-text" x="880" y="1362">projects, users, project_assignments, change_requests, knowledge_repository.</text>
  <text class="note-text" x="880" y="1392">knowledge_base, project_scurve, bukti lapangan, status approval, bimObjectId.</text>

  <rect class="note" x="1620" y="1300" width="700" height="125"/>
  <text class="note-title" x="1650" y="1333">Makna Relasi UML</text>
  <text class="note-text" x="1650" y="1362">Garis penuh: aktor menjalankan use case. Garis putus: include/extend.</text>
  <text class="note-text" x="1650" y="1392">Diagram ini memetakan fungsi sistem, bukan detail urutan proses.</text>
</svg>
