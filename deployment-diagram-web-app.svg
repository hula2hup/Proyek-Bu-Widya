<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1700" viewBox="0 0 2600 1700" role="img" aria-labelledby="title desc">
  <title id="title">Deployment Diagram Aplikasi Web Change Request Konstruksi</title>
  <desc id="desc">Deployment diagram aplikasi web yang menampilkan client browser, lingkungan lokal XAMPP Apache PHP MySQL, lingkungan hosting web server PHP MySQL environment variables, serta API eksternal Autodesk Platform Services.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .node-soft { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .local { fill: #f8fafc; stroke: #0f766e; stroke-width: 3; }
      .hosting { fill: #f8fafc; stroke: #2563eb; stroke-width: 3; }
      .external { fill: #ffffff; stroke: #7c3aed; stroke-width: 3; }
      .artifact { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 800 48px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .node-title { font: 800 28px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 700 21px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .small { font: 400 18px Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 700 15px Arial, sans-serif; fill: #64748b; letter-spacing: 0.02em; }
      .code { font: 700 17px Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .conn { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .conn-dashed { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 12 10; marker-end: url(#arrow-soft); }
      .conn-purple { stroke: #7c3aed; stroke-width: 4; fill: none; marker-end: url(#arrow-purple); }
      .note { font: 400 18px Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .note-strong { font: 800 18px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .badge { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 2; }
      .badge-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; }
      .badge-purple { fill: #f5f3ff; stroke: #ddd6fe; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-soft" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="2600" height="1700"/>
  <text class="title" x="1300" y="82" text-anchor="middle">Deployment Diagram Aplikasi Web</text>
  <text class="subtitle" x="1300" y="124" text-anchor="middle">Sistem Informasi Change Request Konstruksi: local development, hosting environment, database, dan API eksternal</text>

  <!-- Client -->
  <rect class="node" x="110" y="620" width="420" height="260" rx="8" filter="url(#shadow)"/>
  <text class="node-title" x="320" y="682" text-anchor="middle">Client Browser</text>
  <rect class="badge-blue" x="170" y="725" width="300" height="48" rx="6"/>
  <text class="label" x="320" y="756" text-anchor="middle">HTTP / HTTPS</text>
  <text class="small" x="150" y="816">Pengguna: Admin, Project Manager, Site Engineer</text>
  <text class="small" x="150" y="848">Akses halaman HTML dan JavaScript frontend</text>

  <!-- Local env -->
  <rect class="local" x="690" y="230" width="760" height="530" rx="10" filter="url(#shadow)"/>
  <text class="node-title" x="1070" y="288" text-anchor="middle">Lingkungan Lokal</text>
  <text class="small" x="1070" y="322" text-anchor="middle">Development dan pengujian melalui XAMPP</text>

  <rect class="artifact" x="750" y="365" width="260" height="105" rx="8"/>
  <text class="label" x="880" y="405" text-anchor="middle">XAMPP</text>
  <text class="small" x="880" y="438" text-anchor="middle">runtime lokal</text>

  <rect class="artifact" x="1080" y="365" width="310" height="105" rx="8"/>
  <text class="label" x="1235" y="405" text-anchor="middle">Apache</text>
  <text class="small" x="1235" y="438" text-anchor="middle">serving HTML, assets, PHP</text>

  <rect class="artifact" x="750" y="520" width="260" height="105" rx="8"/>
  <text class="label" x="880" y="560" text-anchor="middle">PHP</text>
  <text class="small" x="880" y="593" text-anchor="middle">backend API</text>

  <rect class="artifact" x="1080" y="520" width="310" height="105" rx="8"/>
  <text class="label" x="1235" y="560" text-anchor="middle">MySQL</text>
  <text class="small" x="1235" y="593" text-anchor="middle">database project</text>

  <text class="code" x="750" y="690">Document root: index.html, login.html, admin.html, project-manager.html, site-engineer.html</text>
  <text class="code" x="750" y="724">Backend root: backend/*.php | Assets: assets/* | SQL: backend/data_proyek.sql</text>

  <!-- Hosting env -->
  <rect class="hosting" x="690" y="900" width="760" height="530" rx="10" filter="url(#shadow)"/>
  <text class="node-title" x="1070" y="958" text-anchor="middle">Lingkungan Hosting</text>
  <text class="small" x="1070" y="992" text-anchor="middle">Production deployment pada web server</text>

  <rect class="artifact" x="750" y="1035" width="310" height="105" rx="8"/>
  <text class="label" x="905" y="1075" text-anchor="middle">Web Server</text>
  <text class="small" x="905" y="1108" text-anchor="middle">Apache / compatible</text>

  <rect class="artifact" x="1120" y="1035" width="270" height="105" rx="8"/>
  <text class="label" x="1255" y="1075" text-anchor="middle">PHP</text>
  <text class="small" x="1255" y="1108" text-anchor="middle">API runtime</text>

  <rect class="artifact" x="750" y="1190" width="310" height="105" rx="8"/>
  <text class="label" x="905" y="1230" text-anchor="middle">MySQL</text>
  <text class="small" x="905" y="1263" text-anchor="middle">persistent data store</text>

  <rect class="artifact" x="1120" y="1190" width="270" height="105" rx="8"/>
  <text class="label" x="1255" y="1230" text-anchor="middle">Environment Variables</text>
  <text class="small" x="1255" y="1263" text-anchor="middle">.env / hosting config</text>

  <text class="code" x="750" y="1360">.htaccess: hide .html extension, block protected files, disable directory index</text>
  <text class="code" x="750" y="1394">backend/env.php: reads ../.env or backend/.env for DB and APS credentials</text>

  <!-- Application artifacts -->
  <rect class="node" x="1630" y="330" width="860" height="810" rx="10" filter="url(#shadow)"/>
  <text class="node-title" x="2060" y="390" text-anchor="middle">Artefak Aplikasi dalam Project</text>

  <rect class="badge" x="1690" y="440" width="740" height="76" rx="8"/>
  <text class="label" x="1725" y="472">Frontend HTML CSS JavaScript</text>
  <text class="code" x="1725" y="500">index.html, login.html, admin.html, project-manager.html, site-engineer.html</text>

  <rect class="badge" x="1690" y="545" width="740" height="76" rx="8"/>
  <text class="label" x="1725" y="577">Backend PHP API</text>
  <text class="code" x="1725" y="605">backend/api_*.php, save_data.php, save_approval.php, get_data.php</text>

  <rect class="badge" x="1690" y="650" width="740" height="76" rx="8"/>
  <text class="label" x="1725" y="682">Database Schema</text>
  <text class="code" x="1725" y="710">backend/data_proyek.sql: users, projects, change_requests, knowledge_base</text>

  <rect class="badge" x="1690" y="755" width="740" height="76" rx="8"/>
  <text class="label" x="1725" y="787">Security dan Routing</text>
  <text class="code" x="1725" y="815">.htaccess, .gitignore, backend/env.php</text>

  <rect class="badge" x="1690" y="860" width="740" height="76" rx="8"/>
  <text class="label" x="1725" y="892">Media dan Evidence</text>
  <text class="code" x="1725" y="920">assets/*, uploads/*, evidence file path pada change_requests</text>

  <rect class="badge" x="1690" y="965" width="740" height="76" rx="8"/>
  <text class="label" x="1725" y="997">Dashboard Analytics dan S-Curve</text>
  <text class="code" x="1725" y="1025">api_get_dashboard_stats.php, api_get_scurve.php, project_scurve</text>

  <!-- External APS -->
  <rect class="external" x="1630" y="1230" width="860" height="255" rx="10" filter="url(#shadow)"/>
  <text class="node-title" x="2060" y="1292" text-anchor="middle">API Eksternal</text>
  <rect class="badge-purple" x="1690" y="1340" width="740" height="82" rx="8"/>
  <text class="label" x="1725" y="1374">Autodesk Platform Services</text>
  <text class="code" x="1725" y="1404">backend/api_aps_token.php, backend/api_aps_properties.php</text>
  <text class="small" x="1725" y="1450">Token OAuth dan properti BIM Object ID untuk viewer/model linkage.</text>

  <!-- Connections -->
  <path class="conn" d="M530 710 C610 650 620 570 690 505"/>
  <text class="tiny" x="555" y="610">akses lokal</text>
  <path class="conn" d="M530 790 C610 875 620 1030 690 1130"/>
  <text class="tiny" x="560" y="965">akses hosting</text>

  <path class="conn-dashed" d="M1450 500 C1515 500 1560 500 1630 500"/>
  <text class="tiny" x="1480" y="480">deploy artifact</text>
  <path class="conn-dashed" d="M1450 1160 C1515 1035 1555 920 1630 790"/>
  <text class="tiny" x="1485" y="1030">runtime mapping</text>

  <path class="conn-purple" d="M2060 1140 L2060 1230"/>
  <text class="tiny" x="2085" y="1194">HTTPS API call</text>

  <path class="conn" d="M905 1140 L905 1190"/>
  <text class="tiny" x="928" y="1170">PDO</text>
  <path class="conn" d="M1235 1140 L1235 1190"/>
  <text class="tiny" x="1260" y="1170">env config</text>

  <path class="conn" d="M880 470 L880 520"/>
  <text class="tiny" x="905" y="500">request PHP</text>
  <path class="conn" d="M1010 572 L1080 572"/>
  <text class="tiny" x="1025" y="552">PDO</text>

  <!-- Bottom notes -->
  <rect class="node-soft" x="110" y="1530" width="2380" height="95" rx="8"/>
  <text class="note-strong" x="150" y="1572">Catatan deployment:</text>
  <text class="note" x="150" y="1608">Pada lokal, XAMPP menyediakan Apache, PHP, dan MySQL untuk pengujian. Pada hosting, kredensial database dan Autodesk disimpan sebagai environment variables yang dibaca backend/env.php, sedangkan .htaccess mengatur URL extensionless dan proteksi file backend sensitif.</text>
</svg>
